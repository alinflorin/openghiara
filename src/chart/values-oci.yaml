environment: oci
persistence:
  size: 10Gi
ingress:
  host: openghiara.alinflorin.isroot.in
  className: "traefik"
  vnc:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      traefik.ingress.kubernetes.io/router.middlewares: default-basic-auth@kubernetescrd
  mcp:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
mcpClientSecret: "${CLIENT_SECRET}"