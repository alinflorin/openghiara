apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openghiara.fullname" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  tls:
    - secretName: {{ include "openghiara.fullname" . }}-tls
      hosts:
        - {{ .Values.ingress.host | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: vnc
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
          - path: /authorize
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
