apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openghiara.fullname" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: mcp
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openghiara.fullname" . }}
                port:
                  name: vnc
