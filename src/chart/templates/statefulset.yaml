apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openghiara
spec:
  selector:
    matchLabels:
      app: openghiara
  serviceName: openghiara
  template:
    metadata:
      labels:
        app: openghiara
    spec:
      containers:
        - name: openghiara
          image: ghcr.io/alinflorin/openghiara-{{ .Values.architecture }}:{{ .Chart.AppVersion }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: VNCOPTIONS
              value: "-disableBasicAuth"
          ports:
            - containerPort: 6901
          volumeMounts:
            - name: data
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
