apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openghiara.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "openghiara.fullname" . }}
  serviceName: {{ include "openghiara.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "openghiara.fullname" . }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ include "openghiara.fullname" . }}
          image: kasmweb/core-ubuntu-noble:1.18.0-rolling-weekly
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: VNCOPTIONS
              value: "-disableBasicAuth"
          ports:
            - containerPort: 6901
          volumeMounts:
            - name: data
              mountPath: /home/kasm-user
            - name: shm
              mountPath: /dev/shm
            - name: configs
              mountPath: /dockerstartup/vnc_startup.sh
              subPath: vnc_startup.sh
            - name: configs
              mountPath: /dockerstartup/custom_startup.sh
              subPath: custom_startup.sh
            - name: configs
              mountPath: /etc/kasmvnc/kasmvnc.yaml
              subPath: kasmvnc.yaml
            - name: configs
              mountPath: /etc/1mcp/mcp.json
              subPath: mcp.json
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: configs
          configMap:
            name: {{ include "openghiara.fullname" . }}
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
