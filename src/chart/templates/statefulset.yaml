apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openghiara.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "openghiara.fullname" . }}
  serviceName: {{ include "openghiara.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "openghiara.fullname" . }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ include "openghiara.fullname" . }}
          image: kasmweb/core-ubuntu-noble:1.18.0-rolling-weekly
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: VNCOPTIONS
              value: "-disableBasicAuth"
            - name: INGRESS_HOST
              value: 'https://{{ .Values.ingress.host }}'
            - name: MCP_CLIENT_SECRET
              value: {{ .Values.mcpClientSecret | quote }}
            - name: MCP_TOKEN_EXPIRY
              value: {{ .Values.mcpTokenExpiry | int | quote }}
            - name: DISPLAY
              value: ':1'
          ports:
            - containerPort: 6901
              name: vnc
            - containerPort: 9090
              name: mcp
          volumeMounts:
            - name: data
              mountPath: /home/kasm-user
            - name: shm
              mountPath: /dev/shm
            - name: configs
              mountPath: /dockerstartup/vnc_startup.sh
              subPath: vnc_startup.sh
            - name: configs
              mountPath: /dockerstartup/custom_startup.sh
              subPath: custom_startup.sh
            - name: configs
              mountPath: /etc/kasmvnc/kasmvnc.yaml
              subPath: kasmvnc.yaml
            - name: configs
              mountPath: /etc/1mcp/mcp.json
              subPath: mcp.json
            - name: configs
              mountPath: /etc/1mcp/instructions-template.md
              subPath: instructions-template.md
            - name: configs
              mountPath: /etc/mcp-proxy/mcp-proxy.js
              subPath: mcp-proxy.js
            - name: configs
              mountPath: /etc/sudoers.d/kasm_user_sudo
              subPath: kasm_user_sudo
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: configs
          configMap:
            name: {{ include "openghiara.fullname" . }}
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
